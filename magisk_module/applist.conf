# AppOpt 线程优化配置文件
# 规则编写与使用说明请参考 http://AppOpt.suto.top
#
# 语法:
#   进程级:  包名=核心范围           例: com.tencent.tmgp.sgame=4-7
#   线程级:  包名{线程名}=核心范围   例: com.tencent.tmgp.sgame{UnityMain}=7
#   自动校准:包名=auto              配合 App 悬浮球记录负载后自动生成规则
#
# 核心范围: 4-7 表示 CPU4~7; 4,7 表示 CPU4 与 7; 0-3,7 组合
# 线程名支持通配符: Unity*  *Main  Thread-[0-9]*  Thread-?
#
# 示例 (使用前请按自己设备的 CPU 架构调整核心编号):
# com.tencent.tmgp.sgame=auto

